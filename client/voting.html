<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote | College Voting System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0f1e; color: white; }
    .nav-bar { background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .section-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
    .candidate-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; cursor: pointer; }
    .candidate-card:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.4); transform: translateY(-2px); }
    .candidate-card.selected { background: rgba(59,130,246,0.2); border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
    .candidate-card.voted { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.5); cursor: default; }
    .candidate-card.voted:hover { transform: none; }
    .avatar { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    .btn-vote { background: linear-gradient(135deg, #3b82f6, #1d4ed8); transition: all 0.3s; }
    .btn-vote:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
    .btn-vote:disabled { opacity: 0.5; cursor: not-allowed; }
    .position-header { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.1)); border: 1px solid rgba(59,130,246,0.3); }
    .toast { position: fixed; top: 20px; right: 20px; z-index: 1000; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; transform: translateX(120%); transition: transform 0.4s ease; }
    .toast.show { transform: translateX(0); }
    .toast-success { background: rgba(34,197,94,0.9); color: white; }
    .toast-error { background: rgba(239,68,68,0.9); color: white; }
    .badge-voted { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.5); color: #86efac; }
    .badge-pending { background: rgba(234,179,8,0.2); border: 1px solid rgba(234,179,8,0.5); color: #fde047; }
    .progress-bar { background: rgba(255,255,255,0.1); }
    .progress-fill { background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 1s ease; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 100% { box-shadow: 0 0 0 10px rgba(59,130,246,0); } }
    .pulse { animation: pulse-ring 1.5s ease-out infinite; }
  </style>
</head>
<body>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Navbar -->
  <nav class="nav-bar sticky top-0 z-50 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-blue-600 bg-opacity-20 border border-blue-500 flex items-center justify-center">
          <i class="fas fa-vote-yea text-blue-400 text-lg"></i>
        </div>
        <div>
          <h1 class="text-white font-bold text-lg leading-none">VotePortal</h1>
          <p class="text-blue-400 text-xs">Student Council 2024</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="hidden sm:flex items-center gap-2 text-sm">
          <div id="votingStatusDot" class="w-2 h-2 rounded-full bg-green-400 pulse"></div>
          <span id="votingStatusText" class="text-green-400 font-medium">Voting Active</span>
        </div>
        <div class="text-right hidden sm:block">
          <p id="studentName" class="text-white text-sm font-medium">Loading...</p>
          <p id="studentBranch" class="text-gray-400 text-xs"></p>
        </div>
        <button onclick="logout()" class="text-gray-400 hover:text-red-400 transition-colors ml-2" title="Logout">
          <i class="fas fa-sign-out-alt text-lg"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Progress bar -->
  <div class="max-w-6xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm text-gray-400 font-medium">Voting Progress</span>
      <span id="progressText" class="text-sm text-blue-400 font-semibold">0 / 0 positions voted</span>
    </div>
    <div class="progress-bar rounded-full h-2">
      <div id="progressFill" class="progress-fill h-2 rounded-full" style="width:0%"></div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-6 pb-12">
    <div id="loadingState" class="text-center py-20">
      <i class="fas fa-spinner fa-spin text-blue-400 text-4xl mb-4"></i>
      <p class="text-gray-400">Loading candidates...</p>
    </div>
    <div id="votingContent" class="hidden space-y-8"></div>
    <div id="closedState" class="hidden text-center py-20">
      <i class="fas fa-lock text-red-400 text-4xl mb-4"></i>
      <h2 class="text-xl font-semibold text-white mb-2">Voting is Closed</h2>
      <p class="text-gray-400 mb-6">The voting period is not currently active.</p>
      <a href="results.html" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition-colors">
        <i class="fas fa-chart-bar"></i>View Results
      </a>
    </div>
  </main>

  <script>
    const API = '/api';
    let student = null;
    let selectedVotes = {}; // { position: candidateId }
    let votedPositions = new Set();
    let allPositions = [];
    let groupedCandidates = {};

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `toast toast-${type} show`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'times-circle'} mr-2"></i>${message}`;
      setTimeout(() => { toast.className = 'toast'; }, 3500);
    }

    function logout() {
      localStorage.removeItem('token'); localStorage.removeItem('student');
      window.location.href = 'index.html';
    }

    function updateProgress() {
      const total = allPositions.length;
      const voted = votedPositions.size;
      document.getElementById('progressText').textContent = `${voted} / ${total} positions voted`;
      const pct = total > 0 ? (voted / total) * 100 : 0;
      document.getElementById('progressFill').style.width = pct + '%';
    }

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    }

    function renderCandidates(position, candidates) {
      const isVoted = votedPositions.has(position);
      const selected = selectedVotes[position];

      const cards = candidates.map(c => {
        const isSelected = selected === c._id;
        const cardClass = isVoted
          ? 'candidate-card voted'
          : isSelected ? 'candidate-card selected' : 'candidate-card';
        const checkIcon = isVoted
          ? '<div class="absolute top-3 right-3 w-6 h-6 bg-green-500 rounded-full flex items-center justify-center"><i class="fas fa-check text-white text-xs"></i></div>'
          : isSelected
          ? '<div class="absolute top-3 right-3 w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center"><i class="fas fa-circle text-white text-xs"></i></div>'
          : '';
        return `
          <div class="${cardClass} rounded-xl p-4 relative"
               onclick="${isVoted ? '' : `selectCandidate('${position}', '${c._id}')`}">
            ${checkIcon}
            <div class="flex items-center gap-3">
              <div class="avatar w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                ${getInitials(c.name)}
              </div>
              <div class="flex-1 min-w-0">
                <h4 class="text-white font-semibold text-sm truncate">${c.name}</h4>
                <p class="text-gray-400 text-xs">${c.branch !== 'All' ? c.branch : 'All Branches'}</p>
                ${c.description ? `<p class="text-gray-500 text-xs mt-1 line-clamp-2">${c.description}</p>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      const badge = isVoted
        ? '<span class="badge-voted text-xs px-2 py-0.5 rounded-full font-medium"><i class="fas fa-check mr-1"></i>Voted</span>'
        : '<span class="badge-pending text-xs px-2 py-0.5 rounded-full font-medium"><i class="fas fa-clock mr-1"></i>Pending</span>';

      const voteBtn = isVoted
        ? `<button disabled class="btn-vote text-white text-xs font-semibold px-4 py-2 rounded-lg opacity-50 cursor-not-allowed"><i class="fas fa-check mr-1"></i>Vote Cast</button>`
        : `<button onclick="castVote('${position}')" id="voteBtn-${CSS.escape(position)}"
            class="btn-vote text-white text-xs font-semibold px-4 py-2 rounded-lg ${selected ? '' : 'opacity-50 cursor-not-allowed'}"
            ${selected ? '' : 'disabled'}>
            <i class="fas fa-paper-plane mr-1"></i>Cast Vote
           </button>`;

      return `
        <div class="section-card rounded-2xl p-6" id="section-${CSS.escape(position)}">
          <div class="position-header rounded-xl px-5 py-3 mb-5 flex items-center justify-between flex-wrap gap-3">
            <div class="flex items-center gap-3">
              <i class="fas fa-user-tie text-blue-400 text-lg"></i>
              <h3 class="text-white font-bold text-base">${position}</h3>
            </div>
            <div class="flex items-center gap-3">
              ${badge}
              ${voteBtn}
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" id="cards-${CSS.escape(position)}">
            ${cards.length > 0 ? cards : '<p class="text-gray-500 text-sm col-span-3 text-center py-4">No candidates for this position yet.</p>'}
          </div>
        </div>`;
    }

    function selectCandidate(position, candidateId) {
      if (votedPositions.has(position)) return;
      selectedVotes[position] = candidateId;
      // Re-render just this position's cards
      const section = document.getElementById(`section-${CSS.escape(position)}`);
      if (section) {
        const candidates = groupedCandidates[position];
        section.outerHTML = renderCandidates(position, candidates);
      }
    }

    async function castVote(position) {
      const candidateId = selectedVotes[position];
      if (!candidateId) return;
      const btn = document.getElementById(`voteBtn-${CSS.escape(position)}`);
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Submitting...'; }

      try {
        const res = await fetch(`${API}/votes`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`,
          },
          body: JSON.stringify({ candidateId, position }),
        });
        const data = await res.json();
        if (data.success) {
          votedPositions.add(position);
          student.votedPositions = [...votedPositions];
          localStorage.setItem('student', JSON.stringify(student));
          showToast(`Vote cast for ${position}!`, 'success');
          updateProgress();
          // Re-render this position
          const section = document.getElementById(`section-${CSS.escape(position)}`);
          if (section) {
            section.outerHTML = renderCandidates(position, groupedCandidates[position]);
          }
        } else {
          showToast(data.message || 'Failed to cast vote', 'error');
          if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane mr-1"></i>Cast Vote'; }
        }
      } catch {
        showToast('Network error. Please try again.', 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane mr-1"></i>Cast Vote'; }
      }
    }

    async function loadVotingPage() {
      const token = localStorage.getItem('token');
      const studentData = localStorage.getItem('student');
      if (!token || !studentData) { window.location.href = 'index.html'; return; }

      student = JSON.parse(studentData);
      document.getElementById('studentName').textContent = student.name;
      document.getElementById('studentBranch').textContent = `${student.branch} • ${student.studentId}`;
      votedPositions = new Set(student.votedPositions || []);

      try {
        // Load settings and candidates in parallel
        const [settingsRes, candidatesRes] = await Promise.all([
          fetch(`${API}/votes/public-settings`),
          fetch(`${API}/candidates`),
        ]);

        const settingsData = await settingsRes.json().catch(() => ({}));
        const candidatesData = await candidatesRes.json();

        if (!candidatesData.success) throw new Error('Failed to load candidates');

        const settings = settingsData.settings;
        if (settings && !settings.isVotingActive) {
          document.getElementById('loadingState').classList.add('hidden');
          document.getElementById('closedState').classList.remove('hidden');
          document.getElementById('votingStatusDot').className = 'w-2 h-2 rounded-full bg-red-400';
          document.getElementById('votingStatusText').textContent = 'Voting Closed';
          document.getElementById('votingStatusText').className = 'text-red-400 font-medium';
          return;
        }

        groupedCandidates = candidatesData.grouped;
        allPositions = candidatesData.positions;
        updateProgress();

        const content = document.getElementById('votingContent');
        content.innerHTML = allPositions.map(pos => renderCandidates(pos, groupedCandidates[pos] || [])).join('');
        document.getElementById('loadingState').classList.add('hidden');
        content.classList.remove('hidden');

      } catch (err) {
        document.getElementById('loadingState').innerHTML =
          `<i class="fas fa-exclamation-triangle text-red-400 text-4xl mb-4"></i><p class="text-red-400">Failed to load. Is the server running?</p>`;
      }
    }

    loadVotingPage();
  </script>
</body>
</html>
