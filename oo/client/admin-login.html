<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | College Voting System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1a1a3e 50%, #0f172a 100%); }
    .card-glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: white; }
    .input-field:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }
    .input-field::placeholder { color: rgba(255,255,255,0.4); }
    .btn-admin { background: linear-gradient(135deg, #7c3aed, #4f46e5); transition: all 0.3s; }
    .btn-admin:hover { background: linear-gradient(135deg, #6d28d9, #4338ca); transform: translateY(-1px); box-shadow: 0 10px 30px rgba(124,58,237,0.4); }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.5); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.5); color: #86efac; }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-700 rounded-full opacity-10 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-indigo-700 rounded-full opacity-10 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md mx-4 relative z-10">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-purple-600 bg-opacity-20 border border-purple-500 mb-4">
        <i class="fas fa-shield-alt text-purple-400 text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-white mb-1">Admin Portal</h1>
      <p class="text-purple-300 text-sm">Election Control Panel</p>
    </div>

    <!-- Login Card -->
    <div class="card-glass rounded-2xl p-8 shadow-2xl">
      <h2 class="text-xl font-semibold text-white mb-6 text-center">Admin Login</h2>

      <div id="alertBox" class="hidden rounded-lg px-4 py-3 mb-4 text-sm"></div>

      <form id="adminLoginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">
            <i class="fas fa-user-shield mr-2 text-purple-400"></i>Admin Username
          </label>
          <input type="text" id="username" placeholder="Enter admin username" required
            class="input-field w-full px-4 py-3 rounded-xl text-sm transition-all duration-200" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">
            <i class="fas fa-key mr-2 text-purple-400"></i>Password
          </label>
          <div class="relative">
            <input type="password" id="password" placeholder="Enter admin password" required
              class="input-field w-full px-4 py-3 rounded-xl text-sm pr-12 transition-all duration-200" />
            <button type="button" onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-purple-400 transition-colors">
              <i id="eyeIcon" class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn"
          class="btn-admin w-full py-3 rounded-xl text-white font-semibold text-sm shadow-lg flex items-center justify-center gap-2">
          <i class="fas fa-unlock-alt"></i>
          <span>Access Dashboard</span>
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-white border-opacity-10 text-center">
        <a href="index.html" class="text-gray-400 hover:text-gray-300 text-sm transition-colors inline-flex items-center gap-2">
          <i class="fas fa-arrow-left text-purple-400"></i>Back to Home
        </a>
      </div>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">© 2024 College Student Council Elections</p>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    }

    function showAlert(message, type = 'error') {
      const box = document.getElementById('alertBox');
      box.className = `rounded-lg px-4 py-3 mb-4 text-sm alert-${type}`;
      box.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'} mr-2"></i>${message}`;
      box.classList.remove('hidden');
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('admin', JSON.stringify(data.admin));
          showAlert('Login successful! Redirecting to dashboard...', 'success');
          setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);
        } else {
          showAlert(data.message || 'Invalid credentials');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-unlock-alt"></i><span>Access Dashboard</span>';
        }
      } catch {
        showAlert('Network error. Make sure the server is running.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-unlock-alt"></i><span>Access Dashboard</span>';
      }
    });

    // Redirect if already logged in as admin
    if (localStorage.getItem('adminToken')) {
      window.location.href = 'admin-dashboard.html';
    }
  </script>
</body>
</html>
